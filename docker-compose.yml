version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: evalforge
      POSTGRES_PASSWORD: evalforge
      POSTGRES_DB: evalforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql://evalforge:evalforge@postgres:5432/evalforge
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --allowed-hosts '*'"
    ports:
      - "5001:5000"
    depends_on:
      - postgres
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s   # give pip install time to finish

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env.docker
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      mlflow:
        condition: service_healthy   # ← wait for healthcheck to pass
      postgres:
        condition: service_started
    volumes:
      - .:/app

  ui:
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    env_file: .env.docker
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
  mlflow_artifacts:
