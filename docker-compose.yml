version: "3.9"

services:

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: evalforge
      POSTGRES_PASSWORD: evalforge
      POSTGRES_DB: evalforge
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow psycopg2-binary -q &&
      mlflow server
      --backend-store-uri postgresql://evalforge:evalforge@postgres:5432/evalforge
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0"
    ports:
      - "5001:5000"
    depends_on:
      - postgres
    volumes:
      - mlflow_artifacts:/mlflow/artifacts

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - mlflow
    volumes:
      - .:/app

  ui:
    environment:
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    build:
      context: .
      dockerfile: docker/Dockerfile.ui
    ports:
      - "8501:8501"
    env_file: .env
    depends_on:
      - api
    volumes:
      - .:/app

volumes:
  postgres_data:
  mlflow_artifacts:
