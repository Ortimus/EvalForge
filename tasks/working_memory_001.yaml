task_id: working_memory_001
category: working_memory
difficulty: medium
description: "Recall a specific fact planted earlier in the same context"
prompt_template: |
  Here are some details about a fictional character:
  Name: Marcus, Occupation: lighthouse keeper, Favorite food: clam chowder, 
  Lucky number: 17, Hometown: Port Ellery.

  What is Marcus's hometown?
expected_answer: "Port Ellery"
evaluation_type: regex
answer_pattern: "(?i)port ellery"